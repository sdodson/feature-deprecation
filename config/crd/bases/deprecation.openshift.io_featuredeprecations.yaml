---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: featuredeprecations.deprecation.openshift.io
spec:
  group: deprecation.openshift.io
  names:
    kind: FeatureDeprecation
    listKind: FeatureDeprecationList
    plural: featuredeprecations
    shortNames:
    - fd
    singular: featuredeprecation
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.feature.name
      name: Feature
      type: string
    - jsonPath: .spec.feature.component
      name: Component
      type: string
    - jsonPath: .spec.phase
      name: Phase
      type: string
    - jsonPath: .spec.deprecatedInVersion
      name: Deprecated-In
      type: string
    - jsonPath: .spec.removedInVersion
      name: Removed-In
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: FeatureDeprecation records a platform feature that has been deprecated.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: FeatureDeprecationSpec defines the desired state of FeatureDeprecation.
            properties:
              additionalInfo:
                description: AdditionalInfo holds supplemental information not covered
                  by other fields.
                maxLength: 4096
                type: string
              deprecatedInVersion:
                description: DeprecatedInVersion is the platform version when deprecation
                  was announced.
                pattern: ^\d+\.\d+$
                type: string
              feature:
                description: Feature identifies the feature being deprecated.
                properties:
                  component:
                    description: Component is the platform component that owns this
                      feature.
                    maxLength: 128
                    type: string
                  description:
                    description: Description provides longer context about the feature.
                    maxLength: 2048
                    type: string
                  name:
                    description: Name is the human-readable name of the deprecated
                      feature.
                    maxLength: 256
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              featureInUseMatchingRule:
                description: |-
                  FeatureInUseMatchingRule describes how to detect whether the cluster is
                  actively using this deprecated feature. When set, the controller evaluates
                  the rule on every reconcile and reflects the result in the FeatureInUse
                  status condition. When omitted, the FeatureInUse condition is not set.
                properties:
                  promQL:
                    description: |-
                      PromQL configures a Prometheus query to detect feature usage.
                      Required when type is PromQL; must be omitted otherwise.
                    properties:
                      query:
                        description: |-
                          Query is a PromQL expression to evaluate. The feature is considered in use
                          when the query returns one or more results with non-zero values.
                        maxLength: 2048
                        minLength: 1
                        type: string
                    required:
                    - query
                    type: object
                  resourceJSONPath:
                    description: |-
                      ResourceJSONPath configures a Kubernetes resource field lookup to detect
                      feature usage. Required when type is ResourceJSONPath; must be omitted otherwise.
                    properties:
                      expectedValue:
                        description: |-
                          ExpectedValue is the string value the JSONPath result must equal for
                          the feature to be considered in use.
                        minLength: 1
                        type: string
                      group:
                        description: Group is the API group of the resource. Use an
                          empty string for the core group.
                        type: string
                      jsonPath:
                        description: |-
                          JSONPath is a dot-notation path into the fetched resource
                          (e.g. ".spec.channel", ".status.desired.version").
                          Curly braces are optional; the controller adds them if absent.
                        minLength: 1
                        type: string
                      name:
                        description: |-
                          Name is the name of the specific resource instance to fetch
                          (e.g. "version" for the singleton ClusterVersion).
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace is the namespace of the resource. Leave
                          empty for cluster-scoped resources.
                        type: string
                      resource:
                        description: Resource is the plural resource name (e.g. "clusterversions",
                          "nodes").
                        minLength: 1
                        type: string
                      version:
                        description: Version is the API version of the resource (e.g.
                          "v1", "config.openshift.io/v1").
                        minLength: 1
                        type: string
                    required:
                    - expectedValue
                    - jsonPath
                    - name
                    - resource
                    - version
                    type: object
                  type:
                    allOf:
                    - enum:
                      - PromQL
                      - ResourceJSONPath
                    - enum:
                      - PromQL
                      - ResourceJSONPath
                    description: Type identifies which matching strategy is used.
                    type: string
                required:
                - type
                type: object
                x-kubernetes-validations:
                - message: promQL must be set and resourceJSONPath must not be set
                    when type is PromQL
                  rule: 'self.type == ''PromQL'' ? has(self.promQL) && !has(self.resourceJSONPath)
                    : true'
                - message: resourceJSONPath must be set and promQL must not be set
                    when type is ResourceJSONPath
                  rule: 'self.type == ''ResourceJSONPath'' ? has(self.resourceJSONPath)
                    && !has(self.promQL) : true'
              migrationGuide:
                description: MigrationGuide is a URL pointing to migration documentation.
                maxLength: 2048
                type: string
              phase:
                allOf:
                - enum:
                  - Deprecated
                  - Removed
                - enum:
                  - Deprecated
                  - Removed
                description: Phase is the current lifecycle phase of the feature.
                type: string
              plannedEarliestRemoval:
                description: |-
                  PlannedEarliestRemoval is the expected GA date of the release identified by
                  removedInVersion, formatted as YYYY-MM-DD. This is the earliest date on which
                  the feature will no longer be available on newly installed clusters.
                pattern: ^\d{4}-\d{2}-\d{2}$
                type: string
              plannedEndOfLife:
                description: |-
                  PlannedEndOfLife is the end-of-life date of the last platform version that
                  still includes this feature, formatted as YYYY-MM-DD. Existing clusters
                  running that version will continue to have access to the feature until this
                  date. This may be significantly later than plannedEarliestRemoval — for
                  example, if 6.0 GA is Q4 2029 but 5.8 is supported until Q2 2034.
                pattern: ^\d{4}-\d{2}-\d{2}$
                type: string
              reason:
                description: Reason explains why this feature is being deprecated.
                maxLength: 2048
                minLength: 1
                type: string
              removedInVersion:
                description: RemovedInVersion is the platform version when the feature
                  is/was removed.
                pattern: ^\d+\.\d+$
                type: string
              replacedBy:
                description: ReplacedBy names the feature or API that supersedes this
                  one.
                maxLength: 512
                type: string
            required:
            - deprecatedInVersion
            - feature
            - phase
            - reason
            - removedInVersion
            type: object
          status:
            description: FeatureDeprecationStatus defines the observed state of FeatureDeprecation.
            properties:
              conditions:
                description: Conditions describe the current state of this deprecation
                  record.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the last processed spec generation.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
